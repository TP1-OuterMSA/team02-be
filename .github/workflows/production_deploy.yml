name: CI/CD - Production Deploy

on:
  push:
    branches:
      - production

env:
  APP_ENV: production

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Save short SHA
        id: short-sha
        run: echo "SHORT_SHA=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Build and push Docker image
        env:
          ECR_REPO: 809691348554.dkr.ecr.ap-northeast-2.amazonaws.com/${{ secrets.APP_NAME }}-production-repo
        run: |
          docker build -f Dockerfile \
            -t $ECR_REPO:${{ github.sha }} \
            -t $ECR_REPO:production \
            -t $ECR_REPO:${{ env.SHORT_SHA }} .
          docker push $ECR_REPO:${{ github.sha }}
          docker push $ECR_REPO:production
          docker push $ECR_REPO:${{ env.SHORT_SHA }}

      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: TP1-OuterMSA/msa-infra-main
          token: ${{ secrets.GH_PAT }}
          path: msa-infra-main

      - name: Update Helm values.yaml with new image tag
        run: |
          cd msa-infra-main/charts/services/${{ secrets.APP_NAME }}
          sed -i "s/tag: .*/tag: ${env.SHORT_SHA}/" values.yaml

      - name: Commit and push changes to infrastructure repo
        run: |
          cd msa-infra-main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "ci: update image tag for ${{ secrets.APP_NAME }} to ${{ env.SHORT_SHA }}"
          git push origin main
