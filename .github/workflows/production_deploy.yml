name: CI/CD - team02-be Production

on:
  push:
    branches:
      - production

env:
  APP_ENV: production

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-22.04
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create application.yml file
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_YML_PROD }}" > src/main/resources/application.yml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push Docker image
        env:
          ECR_REPO: '${{ secrets.APP_NAME }}-${{ env.APP_ENV }}-repo'
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPO:${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPO:production .
          docker push $ECR_REGISTRY/$ECR_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPO:production

      - name: Update Helm values.yaml using sed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/TP1-OuterMSA/msa-infra-main.git
          cd msa-infra-main/charts/services/${{ secrets.APP_NAME }}

          sed -i "s/tag:.*/tag: ${{ github.sha }}/" values.yaml

          git add values.yaml
          git commit -m "ci(${{ secrets.APP_NAME }}): 이미지 태그 업데이트 - ${{ github.sha }}"
          git push origin main
